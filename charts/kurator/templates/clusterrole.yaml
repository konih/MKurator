{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kurator.fullname" . }}-manager
  labels:
    {{- include "kurator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [events.k8s.io]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  - apiGroups: [messaging.kurator.dev]
    resources: [authorityrecords, channelauthrules, channels, queuemanagerconnections, queues, topics]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [messaging.kurator.dev]
    resources: [authorityrecords/finalizers, channelauthrules/finalizers, channels/finalizers, queuemanagerconnections/finalizers, queues/finalizers, topics/finalizers]
    verbs: [update]
  - apiGroups: [messaging.kurator.dev]
    resources: [authorityrecords/status, channelauthrules/status, channels/status, queuemanagerconnections/status, queues/status, topics/status]
    verbs: [get, patch, update]
{{- if .Values.metrics.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kurator.fullname" . }}-metrics-auth
  labels:
    {{- include "kurator.labels" . | nindent 4 }}
rules:
  - apiGroups: [authentication.k8s.io]
    resources: [tokenreviews]
    verbs: [create]
  - apiGroups: [authorization.k8s.io]
    resources: [subjectaccessreviews]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kurator.fullname" . }}-metrics-reader
  labels:
    {{- include "kurator.labels" . | nindent 4 }}
rules:
  - nonResourceURLs: ["/metrics"]
    verbs: [get]
{{- end }}
{{- end }}
