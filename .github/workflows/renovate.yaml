name: Renovate

on:
  schedule:
    # Weekly Monday 04:00 UTC — dependency freshness per docs/CICD.md
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    name: renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RENOVATE_REPOSITORIES: ${{ github.repository }}
      # Manual runs ignore renovate.json schedule so PRs open immediately.
      RENOVATE_FORCE: ${{ github.event_name == 'workflow_dispatch' && '{"schedule":null}' || '' }}
      LOG_LEVEL: ${{ github.event_name == 'workflow_dispatch' && 'debug' || '' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          configurationFile: .github/renovate-config.json
          token: ${{ secrets.RENOVATE_TOKEN != '' && secrets.RENOVATE_TOKEN || github.token }}
