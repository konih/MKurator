name: E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLUSTER_NAME: kurator
  KIND_CLUSTER: kurator
  KUBECONFIG: ${{ github.workspace }}/hack/kind-cluster/.state/kubeconfig.yaml
  CERT_MANAGER_INSTALL_SKIP: "true"
  KURATOR_E2E_MQ: "1"
  GOTOOLCHAIN: go1.26.3

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1

      - name: Install kind and mkcert
        run: |
          bindir="${RUNNER_TOOL_CACHE}/bin"
          mkdir -p "${bindir}"
          curl -fsSL -o "${bindir}/kind" \
            "https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64"
          curl -fsSL -o "${bindir}/mkcert" \
            "https://github.com/FiloSottile/mkcert/releases/download/v1.4.4/mkcert-v1.4.4-linux-amd64"
          chmod +x "${bindir}/kind" "${bindir}/mkcert"
          echo "${bindir}" >> "${GITHUB_PATH}"
          echo "PATH=${bindir}:${PATH}" >> "${GITHUB_ENV}"
          echo "KIND=${bindir}/kind" >> "${GITHUB_ENV}"
          "${bindir}/kind" version
          "${bindir}/mkcert" -version

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.8

      - name: Bring up kind + IBM MQ platform
        run: task cluster:up
        env:
          CI: "true"

      - name: Wait for mqweb
        run: bash hack/ci/wait-mqweb.sh

      - name: Run e2e tests
        run: task test:e2e
        env:
          CI: "true"

      - name: Tear down platform
        if: always()
        run: task cluster:down
        env:
          CI: "true"
