name: E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**/README.md"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**/README.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  # Let long main runs finish so results stay visible; cancel superseded PR runs only.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CLUSTER_NAME: kurator
  KIND_CLUSTER: kurator
  KUBECONFIG: ${{ github.workspace }}/hack/kind-cluster/.state/kubeconfig.yaml
  CERT_MANAGER_INSTALL_SKIP: "true"
  KURATOR_E2E_MQ: "1"
  # arduino/setup-task@v2.0.0 still declares node20; no Node 24 release yet.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: e2e (kustomize)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1

      - name: Install platform tools (kind, mkcert, terraform)
        run: task tools:install

      - name: Expose platform tools on PATH
        run: |
          bindir="${{ github.workspace }}/bin"
          echo "${bindir}" >> "${GITHUB_PATH}"
          echo "PATH=${bindir}:${PATH}" >> "${GITHUB_ENV}"
          echo "KIND=${bindir}/kind" >> "${GITHUB_ENV}"
          "${bindir}/kind" version
          "${bindir}/mkcert" -version
          "${bindir}/terraform" version

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Bring up kind + IBM MQ platform
        run: task cluster:up
        env:
          CI: "true"

      - name: Wait for mqweb
        run: bash hack/ci/wait-mqweb.sh

      - name: Run e2e tests
        run: task test:e2e
        env:
          CI: "true"

      - name: Tear down platform
        if: always()
        run: task cluster:down
        env:
          CI: "true"

  e2e-helm:
    name: e2e (helm)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Helm deploy path is slower; run on main pushes and manual dispatch (not every PR).
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1

      - name: Install platform tools (kind, mkcert, terraform)
        run: task tools:install

      - name: Expose platform tools on PATH
        run: |
          bindir="${{ github.workspace }}/bin"
          echo "${bindir}" >> "${GITHUB_PATH}"
          echo "PATH=${bindir}:${PATH}" >> "${GITHUB_ENV}"
          echo "KIND=${bindir}/kind" >> "${GITHUB_ENV}"

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Bring up kind + IBM MQ platform
        run: task cluster:up
        env:
          CI: "true"

      - name: Wait for mqweb
        run: bash hack/ci/wait-mqweb.sh

      - name: Run e2e tests (Helm deploy)
        run: task test:e2e:helm
        env:
          CI: "true"
          KURATOR_E2E_DEPLOY: helm

      - name: Tear down platform
        if: always()
        run: task cluster:down
        env:
          CI: "true"
