name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.1.0); workflow_dispatch rebuilds assets for testing"
        required: true
        type: string

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kurator

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write # cosign keyless signing (OIDC)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "tag must look like vX.Y.Z (got ${TAG})" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}"
          echo "repository=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "tags=${IMAGE}:${{ steps.version.outputs.version }},${IMAGE}:${{ steps.version.outputs.tag }}" >> "${GITHUB_OUTPUT}"

      - name: Build and push controller image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.repository }}:${{ steps.version.outputs.version }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - uses: sigstore/cosign-installer@b4da77ecad80ff9afe572690e3ce4a55a58e629c # v3.9.1

      - name: Sign container image
        run: |
          cosign sign --yes \
            "${{ steps.image.outputs.repository }}@${{ steps.build.outputs.digest }}"

      - name: Prepare dist directory
        run: mkdir -p dist

      - uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # v0.20.6
        with:
          image: ${{ steps.image.outputs.repository }}@${{ steps.build.outputs.digest }}
          output-file: dist/sbom.spdx.json
          format: spdx-json
          registry-username: ${{ github.repository_owner }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release assets
        run: bash hack/release-assets.sh "${{ steps.version.outputs.version }}" "${{ steps.image.outputs.repository }}"

      - name: Log in to Helm registry (GHCR)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY }}" \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - id: chart
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "oci=oci://${{ env.REGISTRY }}/${OWNER}" >> "${GITHUB_OUTPUT}"

      - name: Publish Helm chart to GHCR
        run: |
          helm push "dist/kurator-${{ steps.version.outputs.version }}.tgz" "${{ steps.chart.outputs.oci }}"

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          version: v2.13.1
          config: cliff.toml
          args: --latest --strip header
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble release notes
        env:
          CLIFF_CHANGELOG: ${{ steps.cliff.outputs.changelog }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          IMAGE_REPO: ${{ steps.image.outputs.repository }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          CHART_OCI: ${{ steps.chart.outputs.oci }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x hack/assemble-release-notes.sh
          printf '%s\n' "${CLIFF_CHANGELOG}" >"${RUNNER_TEMP}/changelog.md"
          CHANGELOG_SECTION="${RUNNER_TEMP}/changelog.md" \
            bash hack/assemble-release-notes.sh "${RUNNER_TEMP}/release-body.md"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Kurator ${{ steps.version.outputs.version }}
          body_path: ${{ runner.temp }}/release-body.md
          files: |
            dist/install-crds.yaml
            dist/install.yaml
            dist/kurator-${{ steps.version.outputs.version }}.tgz
            dist/sbom.spdx.json
            dist/checksums.txt
