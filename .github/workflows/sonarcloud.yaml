# SonarCloud — DISABLED until the repository moves to the conduit-ops GitHub org.
# To enable: set SONAR_TOKEN secret, set sonar.projectKey below, remove `if: false`.
name: SonarCloud

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonarcloud:
    name: sonarcloud
    if: false
    runs-on: ubuntu-latest
    env:
      # SONAR_PROJECT_KEY: conduit-ops_mkurator
      COVERAGE_MIN: "91"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          envtest: true
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1
      - name: Unit tests and coverage
        run: task test:run
        env:
          CI: "true"
      - uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
