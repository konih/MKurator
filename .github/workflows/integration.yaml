name: Integration

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**/README.md"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**/README.md"
  workflow_dispatch:

permissions:
  contents: read

# arduino/setup-task@v2.0.0 still declares node20; no Node 24 release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  # Let long main runs finish so results stay visible; cancel superseded PR runs only.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  integration:
    name: integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1

      - name: Bring up Docker IBM MQ
        run: task mq:integration:up
        env:
          CI: "true"

      - name: Wait for mqweb
        run: task mq:integration:wait
        env:
          CI: "true"

      - name: Run integration tests
        run: task test:integration
        env:
          CI: "true"

      - name: Tear down IBM MQ
        if: always()
        run: task mq:integration:down
        env:
          CI: "true"
