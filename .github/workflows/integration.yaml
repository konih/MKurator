name: Integration

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**/README.md"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**/README.md"
  workflow_dispatch:

permissions:
  contents: read

# arduino/setup-task@v2.0.0 still declares node20; no Node 24 release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  # Let long main runs finish so results stay visible; cancel superseded PR runs only.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  integration:
    name: integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1

      - uses: ./.github/actions/mq-docker-image

      - name: Bring up Docker IBM MQ
        run: task mq:integration:up
        env:
          CI: "true"

      - name: Wait for mqweb
        run: task mq:integration:wait
        env:
          CI: "true"

      - name: Run integration tests
        run: task test:integration
        env:
          CI: "true"

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-junit
          path: artifacts/integration-junit.xml
          if-no-files-found: warn

      - name: Tear down IBM MQ
        if: always()
        run: task mq:integration:down
        env:
          CI: "true"
