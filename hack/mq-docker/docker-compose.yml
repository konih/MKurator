# Standalone IBM MQ for Kurator integration tests (mqweb on localhost:9443).
# See README.md and: task mq:integration:up
services:
  ibm-mq:
    # renovate: datasource=docker depName=icr.io/ibm-messaging/mq
    image: icr.io/ibm-messaging/mq:9.4.5.1-r1
    container_name: kurator-mq-integration
    environment:
      LICENSE: accept
      MQ_QMGR_NAME: QM1
      MQ_ADMIN_PASSWORD: passw0rd
      MQ_APP_PASSWORD: passw0rd
    ports:
      - "9443:9443"
      - "1414:1414"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sk -u admin:passw0rd -o /dev/null -w '%{http_code}' https://localhost:9443/ibmmq/rest/v3/admin/qmgr/QM1 | grep -qE '^(200|401|403)$'",
        ]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s
