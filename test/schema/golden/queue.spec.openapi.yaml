description: QueueSpec defines a queue to maintain on a referenced queue manager.
properties:
  adoptionPolicy:
    default: Adopt
    description: AdoptionPolicy controls behaviour when the MQ object already exists
      on first reconcile.
    enum:
    - Adopt
    - AdoptIfMatching
    - FailIfExists
    type: string
  attributes:
    additionalProperties:
      type: string
    description: |-
      Attributes map to MQSC parameters (lowercase keys in mqweb runCommandJSON).
      Drift-checked vs define-only keys: docs/ATTRIBUTE_RECONCILIATION.md.
    type: object
  connectionRef:
    description: ConnectionRef names a QueueManagerConnection in the same namespace.
    properties:
      name:
        minLength: 1
        type: string
    required:
    - name
    type: object
  defPersistence:
    description: |-
      DefPersistence is the default message persistence for new messages (MQSC DEFPSIST).
      Mutually exclusive with attributes.defpsist; typed field takes precedence when folded
      into the attribute map for mqadmin.
    enum:
    - "yes"
    - "no"
    type: string
  deletionPolicy:
    default: Delete
    description: DeletionPolicy controls MQ cleanup when the CR is deleted.
    enum:
    - Delete
    - Orphan
    type: string
  description:
    description: |-
      Description is the queue description (MQSC DESCR).
      Mutually exclusive with attributes.descr; typed field takes precedence when folded
      into the attribute map for mqadmin.
    type: string
  get:
    description: |-
      Get controls whether applications may retrieve messages from the queue (MQSC GET).
      Mutually exclusive with attributes.get; typed field takes precedence when folded
      into the attribute map for mqadmin.
    enum:
    - enabled
    - disabled
    type: string
  maxDepth:
    description: |-
      MaxDepth is the maximum number of messages the queue can hold (MQSC MAXDEPTH).
      Mutually exclusive with attributes.maxdepth; typed field takes precedence when folded
      into the attribute map for mqadmin.
    format: int32
    maximum: 999999999
    minimum: 1
    type: integer
  put:
    description: |-
      Put controls whether applications may put messages on the queue (MQSC PUT).
      Mutually exclusive with attributes.put; typed field takes precedence when folded
      into the attribute map for mqadmin.
    enum:
    - enabled
    - disabled
    type: string
  queueName:
    description: QueueName is the IBM MQ object name.
    maxLength: 48
    minLength: 1
    pattern: ^[A-Z0-9./%&$#@]+$
    type: string
    x-kubernetes-validations:
    - message: name must not have leading or trailing whitespace
      rule: self == self.trim()
    - message: name must not start or end with '.'
      rule: '!self.startsWith(''.'') && !self.endsWith(''.'')'
    - message: names with prefix SYSTEM. are reserved for queue manager objects
      rule: '!self.upperAscii().startsWith(''SYSTEM.'')'
    - message: names with prefix AMQ are reserved for IBM MQ internal use
      rule: '!self.upperAscii().startsWith(''AMQ'')'
  remoteQueueManager:
    description: |-
      RemoteQueueManager is the name of the remote queue manager (MQSC RQMNAME).
      Required for type remote when not set via attributes.rqmname (or attributes.remotemanager).
      Mutually exclusive with attributes.rqmname and attributes.remotemanager; typed field takes
      precedence when folded into the attribute map for mqadmin.
    maxLength: 48
    minLength: 1
    pattern: ^[A-Z0-9./%&$#@]+$
    type: string
  suspend:
    description: Suspend pauses MQ reconciliation for this object. Status shows Synced=False
      ReasonSuspended.
    type: boolean
  targetQueue:
    description: |-
      TargetQueue is the local or remote queue name an alias resolves to (MQSC TARGQ).
      Required for type alias when not set via attributes.targq (or attributes.target).
      Mutually exclusive with attributes.targq and attributes.target; typed field takes
      precedence when folded into the attribute map for mqadmin.
    maxLength: 48
    minLength: 1
    pattern: ^[A-Z0-9./%&$#@]+$
    type: string
  type:
    default: local
    description: 'Type is the queue kind to define: local (QLOCAL), alias (QALIAS),
      or remote (QREMOTE).'
    enum:
    - local
    - alias
    - remote
    type: string
  xmitQueue:
    description: |-
      XmitQueue is the transmission queue used to reach the remote queue manager (MQSC XMITQ).
      Required for type remote when not set via attributes.xmitq (or attributes.transmissionqueue).
      Mutually exclusive with attributes.xmitq and attributes.transmissionqueue; typed field takes
      precedence when folded into the attribute map for mqadmin.
    maxLength: 48
    minLength: 1
    pattern: ^[A-Z0-9./%&$#@]+$
    type: string
required:
- connectionRef
- queueName
type: object
x-kubernetes-validations:
- message: alias queues require targetQueue or attribute targq (or target)
  rule: self.type != 'alias' || (has(self.targetQueue) && size(self.targetQueue) >
    0) || (has(self.attributes) && (('targq' in self.attributes && size(self.attributes['targq'])
    > 0) || ('target' in self.attributes && size(self.attributes['target']) > 0)))
- message: remote queues require xmitQueue or attribute xmitq (or transmissionqueue)
  rule: self.type != 'remote' || (has(self.xmitQueue) && size(self.xmitQueue) > 0)
    || (has(self.attributes) && (('xmitq' in self.attributes && size(self.attributes['xmitq'])
    > 0) || ('transmissionqueue' in self.attributes && size(self.attributes['transmissionqueue'])
    > 0)))
- message: remote queues require remoteQueueManager or attribute rqmname (or remotemanager)
  rule: self.type != 'remote' || (has(self.remoteQueueManager) && size(self.remoteQueueManager)
    > 0) || (has(self.attributes) && (('rqmname' in self.attributes && size(self.attributes['rqmname'])
    > 0) || ('remotemanager' in self.attributes && size(self.attributes['remotemanager'])
    > 0)))
- message: maxDepth field and attributes.maxdepth are mutually exclusive
  rule: '!has(self.maxDepth) || !has(self.attributes) || !self.attributes.exists(k,
    k.lowerAscii() == ''maxdepth'')'
- message: description field and attributes.descr are mutually exclusive
  rule: '!has(self.description) || self.description.size() == 0 || !has(self.attributes)
    || !self.attributes.exists(k, k.lowerAscii() == ''descr'')'
- message: defPersistence field and attributes.defpsist are mutually exclusive
  rule: '!has(self.defPersistence) || !has(self.attributes) || !self.attributes.exists(k,
    k.lowerAscii() == ''defpsist'')'
- message: get field and attributes.get are mutually exclusive
  rule: '!has(self.get) || !has(self.attributes) || !self.attributes.exists(k, k.lowerAscii()
    == ''get'')'
- message: put field and attributes.put are mutually exclusive
  rule: '!has(self.put) || !has(self.attributes) || !self.attributes.exists(k, k.lowerAscii()
    == ''put'')'
- message: targetQueue field and attributes.targq (or target) are mutually exclusive
  rule: '!has(self.targetQueue) || self.targetQueue.size() == 0 || !has(self.attributes)
    || !self.attributes.exists(k, k.lowerAscii() == ''targq'' || k.lowerAscii() ==
    ''target'')'
- message: xmitQueue field and attributes.xmitq (or transmissionqueue) are mutually
    exclusive
  rule: '!has(self.xmitQueue) || self.xmitQueue.size() == 0 || !has(self.attributes)
    || !self.attributes.exists(k, k.lowerAscii() == ''xmitq'' || k.lowerAscii() ==
    ''transmissionqueue'')'
- message: remoteQueueManager field and attributes.rqmname (or remotemanager) are
    mutually exclusive
  rule: '!has(self.remoteQueueManager) || self.remoteQueueManager.size() == 0 || !has(self.attributes)
    || !self.attributes.exists(k, k.lowerAscii() == ''rqmname'' || k.lowerAscii()
    == ''remotemanager'')'
