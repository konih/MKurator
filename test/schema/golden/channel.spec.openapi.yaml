description: ChannelSpec defines a channel to maintain on a referenced queue manager.
properties:
  adoptionPolicy:
    default: Adopt
    description: AdoptionPolicy controls behaviour when the MQ object already exists
      on first reconcile.
    enum:
    - Adopt
    - AdoptIfMatching
    - FailIfExists
    type: string
  attributes:
    additionalProperties:
      type: string
    description: |-
      Attributes map to MQSC parameters (lowercase keys in mqweb runCommandJSON).
      Drift-checked vs define-only keys: docs/ATTRIBUTE_RECONCILIATION.md.
    type: object
  channelName:
    description: ChannelName is the IBM MQ channel name (e.g. ORDERS.APP).
    maxLength: 48
    minLength: 1
    pattern: ^[A-Z0-9./%&$#@]+$
    type: string
    x-kubernetes-validations:
    - message: name must not have leading or trailing whitespace
      rule: self == self.trim()
    - message: name must not start or end with '.'
      rule: '!self.startsWith(''.'') && !self.endsWith(''.'')'
    - message: names with prefix SYSTEM. are reserved for queue manager objects
      rule: '!self.upperAscii().startsWith(''SYSTEM.'')'
    - message: names with prefix AMQ are reserved for IBM MQ internal use
      rule: '!self.upperAscii().startsWith(''AMQ'')'
  connectionRef:
    description: ConnectionRef names a QueueManagerConnection in the same namespace.
    properties:
      name:
        minLength: 1
        type: string
    required:
    - name
    type: object
  deletionPolicy:
    default: Delete
    description: DeletionPolicy controls MQ cleanup when the CR is deleted.
    enum:
    - Delete
    - Orphan
    type: string
  description:
    description: |-
      Description is the channel description (MQSC DESCR).
      Mutually exclusive with attributes.descr; typed field takes precedence when folded
      into the attribute map for mqadmin.
    type: string
  maxMsgLength:
    description: |-
      MaxMsgLength is the maximum message length in bytes (MQSC MAXMSGL).
      Mutually exclusive with attributes.maxmsgl; typed field takes precedence when folded
      into the attribute map for mqadmin.
    format: int32
    maximum: 999999999
    minimum: 0
    type: integer
  suspend:
    description: Suspend pauses MQ reconciliation for this object. Status shows Synced=False
      ReasonSuspended.
    type: boolean
  type:
    default: svrconn
    description: Type is the channel kind to define. Only svrconn is reconciled in
      v1alpha1.
    enum:
    - svrconn
    type: string
required:
- channelName
- connectionRef
type: object
x-kubernetes-validations:
- message: description field and attributes.descr are mutually exclusive
  rule: '!has(self.description) || self.description.size() == 0 || !has(self.attributes)
    || !self.attributes.exists(k, k.lowerAscii() == ''descr'')'
- message: maxMsgLength field and attributes.maxmsgl are mutually exclusive
  rule: '!has(self.maxMsgLength) || !has(self.attributes) || !self.attributes.exists(k,
    k.lowerAscii() == ''maxmsgl'')'
