description: TopicSpec defines an administrative topic object on a referenced queue
  manager.
properties:
  adoptionPolicy:
    default: Adopt
    description: AdoptionPolicy controls behaviour when the MQ object already exists
      on first reconcile.
    enum:
    - Adopt
    - AdoptIfMatching
    - FailIfExists
    type: string
  attributes:
    additionalProperties:
      type: string
    description: |-
      Attributes map to MQSC parameters (lowercase keys in mqweb runCommandJSON).
      Drift-checked vs define-only keys: docs/ATTRIBUTE_RECONCILIATION.md.
    type: object
  connectionRef:
    description: ConnectionRef names a QueueManagerConnection in the same namespace.
    properties:
      name:
        minLength: 1
        type: string
    required:
    - name
    type: object
  deletionPolicy:
    default: Delete
    description: DeletionPolicy controls MQ cleanup when the CR is deleted.
    enum:
    - Delete
    - Orphan
    type: string
  description:
    description: |-
      Description is the topic description (MQSC DESCR).
      Mutually exclusive with attributes.descr; typed field takes precedence when folded
      into the attribute map for mqadmin.
    type: string
  suspend:
    description: Suspend pauses MQ reconciliation for this object. Status shows Synced=False
      ReasonSuspended.
    type: boolean
  topicName:
    description: TopicName is the IBM MQ topic object name (e.g. RETAIL.ORDERS).
    maxLength: 48
    minLength: 1
    pattern: ^[A-Z0-9./%&$#@]+$
    type: string
    x-kubernetes-validations:
    - message: name must not have leading or trailing whitespace
      rule: self == self.trim()
    - message: name must not start or end with '.'
      rule: '!self.startsWith(''.'') && !self.endsWith(''.'')'
    - message: names with prefix SYSTEM. are reserved for queue manager objects
      rule: '!self.upperAscii().startsWith(''SYSTEM.'')'
    - message: names with prefix AMQ are reserved for IBM MQ internal use
      rule: '!self.upperAscii().startsWith(''AMQ'')'
  topicString:
    description: |-
      TopicString is the IBM MQ topic string (MQSC TOPICSTR / attribute topstr).
      Mutually exclusive with attributes.topstr and attributes.topicstr; typed field
      takes precedence when folded into the attribute map for mqadmin.
    type: string
required:
- connectionRef
- topicName
type: object
x-kubernetes-validations:
- message: topicString field and attributes.topstr (or topicstr) are mutually exclusive
  rule: '!has(self.topicString) || self.topicString.size() == 0 || !has(self.attributes)
    || !self.attributes.exists(k, k.lowerAscii() == ''topstr'' || k.lowerAscii() ==
    ''topicstr'')'
- message: description field and attributes.descr are mutually exclusive
  rule: '!has(self.description) || self.description.size() == 0 || !has(self.attributes)
    || !self.attributes.exists(k, k.lowerAscii() == ''descr'')'
