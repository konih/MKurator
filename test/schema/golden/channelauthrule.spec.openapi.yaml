description: ChannelAuthRuleSpec defines a SET CHLAUTH rule on a referenced queue
  manager.
properties:
  address:
    description: Address maps to ADDRESS(...) for ADDRESSMAP and BLOCKADDR rules.
    type: string
  adoptionPolicy:
    default: Adopt
    description: AdoptionPolicy controls behaviour when the MQ object already exists
      on first reconcile.
    enum:
    - Adopt
    - AdoptIfMatching
    - FailIfExists
    type: string
  channelName:
    description: ChannelName is the IBM MQ channel name in SET CHLAUTH('…').
    maxLength: 48
    minLength: 1
    pattern: ^[A-Z0-9./%&$#@*]+$
    type: string
    x-kubernetes-validations:
    - message: name must not have leading or trailing whitespace
      rule: self == self.trim()
    - message: name must not start or end with '.'
      rule: '!self.startsWith(''.'') && !self.endsWith(''.'')'
    - message: names with prefix SYSTEM. are reserved for queue manager objects
      rule: '!self.upperAscii().startsWith(''SYSTEM.'')'
    - message: names with prefix AMQ are reserved for IBM MQ internal use
      rule: '!self.upperAscii().startsWith(''AMQ'')'
  checkClient:
    description: CheckClient maps to CHCKCLNT(...) for ADDRESSMAP rules.
    enum:
    - REQUIRED
    - ASQMGR
    - REQDADM
    - ASCHL
    - OPTIONAL
    type: string
  clientUser:
    description: ClientUser maps to CLNTUSER(...) for USERMAP rules.
    type: string
  connectionRef:
    description: ConnectionRef names a QueueManagerConnection in the same namespace.
    properties:
      name:
        minLength: 1
        type: string
    required:
    - name
    type: object
  deletionPolicy:
    default: Delete
    description: DeletionPolicy controls MQ cleanup when the CR is deleted.
    enum:
    - Delete
    - Orphan
    type: string
  description:
    description: Description maps to DESCR(...).
    type: string
  mcaUser:
    description: |-
      McaUser maps to MCAUSER(...) for USERMAP (USERSRC MAP), SSLPEERMAP (USERSRC MAP),
      QMGRMAP (USERSRC MAP), and ADDRESSMAP (USERSRC MAP) rules.
    type: string
  remoteQueueManager:
    description: RemoteQueueManager maps to QMNAME(...) for QMGRMAP rules (remote
      partner queue manager name).
    type: string
  ruleType:
    description: RuleType maps to CHLAUTH TYPE(...).
    enum:
    - ADDRESSMAP
    - BLOCKUSER
    - USERMAP
    - SSLPEERMAP
    - QMGRMAP
    - BLOCKADDR
    type: string
  sslPeerName:
    description: SslPeerName maps to SSLPEER(...) for SSLPEERMAP rules (TLS certificate
      DN pattern).
    type: string
  suspend:
    description: Suspend pauses MQ reconciliation for this object. Status shows Synced=False
      ReasonSuspended.
    type: boolean
  userList:
    description: UserList maps to USERLIST(...) for BLOCKUSER rules.
    type: string
  userSource:
    description: UserSource maps to USERSRC(...) for ADDRESSMAP, USERMAP, SSLPEERMAP,
      and QMGRMAP rules.
    enum:
    - CHANNEL
    - NOACCESS
    - MAP
    type: string
required:
- channelName
- connectionRef
- ruleType
type: object
x-kubernetes-validations:
- message: address is required for ADDRESSMAP rules
  rule: self.ruleType != 'ADDRESSMAP' || (has(self.address) && size(self.address)
    > 0)
- message: address is required for BLOCKADDR rules
  rule: self.ruleType != 'BLOCKADDR' || (has(self.address) && size(self.address) >
    0)
- message: userList is required for BLOCKUSER rules
  rule: self.ruleType != 'BLOCKUSER' || (has(self.userList) && size(self.userList)
    > 0)
- message: clientUser is required for USERMAP rules
  rule: self.ruleType != 'USERMAP' || (has(self.clientUser) && size(self.clientUser)
    > 0)
- message: sslPeerName is required for SSLPEERMAP rules
  rule: self.ruleType != 'SSLPEERMAP' || (has(self.sslPeerName) && size(self.sslPeerName)
    > 0)
- message: remoteQueueManager is required for QMGRMAP rules
  rule: self.ruleType != 'QMGRMAP' || (has(self.remoteQueueManager) && size(self.remoteQueueManager)
    > 0)
- message: mcaUser is required when userSource is MAP
  rule: (self.ruleType != 'USERMAP' && self.ruleType != 'SSLPEERMAP' && self.ruleType
    != 'QMGRMAP') || self.userSource != 'MAP' || (has(self.mcaUser) && size(self.mcaUser)
    > 0)
